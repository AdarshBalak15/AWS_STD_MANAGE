<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Modify student details and password.">
  <title>Edit Profile - EduCloud</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Global Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  <!-- Dashboard Layout Stylesheet -->
  <link href="css/dashboard.css" rel="stylesheet">
  <!-- Profile Page Stylesheet -->
  <link href="css/profile.css" rel="stylesheet">
  
  <!-- Route Guard -->
  <script>
    if (!localStorage.getItem('sms_current_student')) {
      window.location.href = 'student-login.html';
    }
  </script>
</head>
<body>

  <!-- Full Wrapper -->
  <div class="wrapper">
    
    <!-- Sidebar Component -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <a href="student-dashboard.html" class="sidebar-logo">
          <i class="bi bi-clouds-fill fs-4 float-anim"></i>
          <span>EduCloud</span>
        </a>
      </div>
      
      <ul class="components">
        <li>
          <a href="student-dashboard.html">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="active">
          <a href="student-profile.html">
            <i class="bi bi-person-bounding-box"></i>
            <span>My Profile</span>
          </a>
        </li>
        <li>
          <a href="upload-document.html">
            <i class="bi bi-cloud-arrow-up-fill"></i>
            <span>Upload Documents</span>
          </a>
        </li>
        <li class="mt-5">
          <a href="#" class="logout-trigger text-danger">
            <i class="bi bi-box-arrow-left text-danger"></i>
            <span>Logout</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Content Area -->
    <div id="content">
      
      <!-- Top Navbar -->
      <nav class="navbar dashboard-navbar nav-glass">
        <div class="d-flex align-items-center gap-3">
          <button type="button" id="sidebarCollapse" class="btn btn-light rounded-circle" aria-label="Toggle sidebar">
            <i class="bi bi-justify-left"></i>
          </button>
          
          <!-- Breadcrumbs -->
          <div id="breadcrumbs-container" class="d-none d-md-block"></div>
        </div>
        
        <div class="d-flex align-items-center gap-3">
          <!-- Dark Mode Toggle -->
          <button id="theme-toggle" class="btn btn-link text-decoration-none text-secondary p-2" aria-label="Toggle dark mode">
            <i class="bi bi-moon-stars-fill"></i>
          </button>
          
          <!-- User Profile Avatar -->
          <img id="nav-avatar" src="https://ui-avatars.com/api/?name=Student&background=2563EB&color=fff" alt="Student Profile Avatar" class="profile-dropdown-img">
        </div>
      </nav>

      <!-- Main Container -->
      <div class="container-fluid p-4">
        
        <div class="d-flex align-items-center mb-4 gap-2">
          <a href="student-profile.html" class="btn btn-light rounded-circle p-2 d-inline-flex align-items-center justify-content-center" style="width:36px; height:36px;" aria-label="Go Back">
            <i class="bi bi-arrow-left"></i>
          </a>
          <h3 class="fw-bold mb-0 text-primary d-flex align-items-center gap-2">
            <i class="bi bi-pencil-square fs-3"></i>
            <span>Edit Profile</span>
          </h3>
        </div>

        <div class="row g-4">
          
          <!-- Form Section -->
          <div class="col-12">
            <div class="glass-card slide-up p-4">
              <form id="edit-profile-form" novalidate>
                
                <!-- Avatar Select Component -->
                <div class="profile-photo-select-wrapper mb-4 text-center">
                  <div class="position-relative d-inline-block">
                    <img id="profile-photo-edit-preview" src="https://ui-avatars.com/api/?name=Student&background=2563EB&color=fff&size=128" alt="Avatar Edit Preview" class="profile-photo-edit-preview shadow" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover;">
                    
                    <label for="edit-photo-input" class="profile-photo-select-btn d-flex align-items-center justify-content-center" aria-label="Select photo" style="position: absolute; bottom: 0; right: 0; width: 34px; height: 34px; border-radius: 50%; background-color: var(--primary-color); color: #fff; cursor: pointer;">
                      <i class="bi bi-pencil-fill" style="font-size:0.9rem;"></i>
                    </label>
                    <input type="file" id="edit-photo-input" accept="image/*" style="display:none;">
                  </div>
                </div>

                <!-- Fields -->
                <h5 class="fw-bold text-primary mb-3 pb-2 border-bottom d-flex align-items-center gap-2" style="border-color: var(--border-color) !important;">
                  <i class="bi bi-person-bounding-box"></i>
                  <span>Account Details</span>
                </h5>
                
                <div class="mb-3">
                  <label class="form-label text-secondary small fw-bold">Full Name</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light-subtle" style="border-color: var(--border-color) !important;"><i class="bi bi-person-fill text-secondary"></i></span>
                    <input type="text" id="edit-name" class="form-control" style="border-color: var(--border-color) !important;" required autocomplete="name">
                  </div>
                  <div class="invalid-feedback">Please enter your full name (minimum 3 characters).</div>
                </div>

                <div class="mb-3">
                  <label class="form-label text-secondary small fw-bold">Email Address</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light-subtle" style="border-color: var(--border-color) !important;"><i class="bi bi-envelope-fill text-secondary"></i></span>
                    <input type="email" id="edit-email" class="form-control" style="border-color: var(--border-color) !important;" required autocomplete="email">
                  </div>
                  <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-3">
                  <label class="form-label text-secondary small fw-bold">New Password (leave blank to keep current)</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light-subtle" style="border-color: var(--border-color) !important;"><i class="bi bi-shield-lock-fill text-secondary"></i></span>
                    <input type="password" id="edit-password" class="form-control" style="border-color: var(--border-color) !important;" autocomplete="new-password" placeholder="New Password">
                  </div>
                  <div class="invalid-feedback">Password must be at least 6 characters.</div>
                </div>

                <!-- Save Button -->
                <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top" style="border-color: var(--border-color) !important;">
                  <a href="student-profile.html" class="btn btn-light rounded-pill px-4">Cancel</a>
                  <button type="submit" class="btn-premium rounded-pill px-4">
                    <i class="bi bi-floppy-fill me-2"></i>Save Changes
                  </button>
                </div>

              </form>
            </div>
          </div>

        </div>

      </div>

    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="js/app.js"></script>
  <!-- Profile Page Logic -->
  <script src="js/profile.js"></script>
</body>
</html>
