<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCloud - Page Not Found">
  <title>404 - Page Not Found - EduCloud</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Global Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  
  <style>
    .error-wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="error-wrapper">
    <!-- Glowing Spots -->
    <div class="glow-spot" style="top: 20%; left: 20%; opacity: 0.8; width: 350px; height: 350px;"></div>
    <div class="glow-spot-accent" style="bottom: 20%; right: 20%; opacity: 0.8; width: 350px; height: 350px;"></div>
    
    <div class="glass-card glow-border text-center p-5 slide-up" style="max-width: 500px; z-index: 1;">
      
      <!-- Graphic Icon -->
      <div class="float-anim mb-4">
        <i class="bi bi-cloud-slash-fill text-primary" style="font-size: 6rem; filter: drop-shadow(0 0 30px rgba(99,102,241,0.25));"></i>
      </div>
      
      <!-- Title -->
      <h1 class="fw-bold mb-2 text-primary" style="font-size: 3rem; letter-spacing: -1.5px; background: linear-gradient(135deg, var(--text-primary) 30%, var(--primary-color) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404 Error</h1>
      <h4 class="fw-bold text-primary mb-3">Resource Not Found</h4>
      
      <!-- Subtitle -->
      <p class="text-secondary small mb-4" style="line-height: 1.6;">
        The cloud resource you requested is unavailable or has been archived. Check your connection or route directory settings.
      </p>
      
      <!-- Action Button -->
      <a href="index.html" class="btn-premium rounded-pill">
        <i class="bi bi-house-door-fill me-1"></i> Return to Safe Zone
      </a>
      
    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="js/app.js"></script>
</body>
</html>
