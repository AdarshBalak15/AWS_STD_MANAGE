<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access your student profile, upload documents and track verification status on EduCloud.">
  <title>Student Login - EduCloud</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- Global Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  <!-- Login Stylesheet -->
  <link href="css/login.css" rel="stylesheet">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card slide-up">
      
      <!-- Card Header -->
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <h2 class="auth-title">Student Login</h2>
        <p class="auth-subtitle">Access your account dashboard</p>
      </div>

      <!-- Card Body -->
      <div class="auth-body">
        <form id="student-login-form" novalidate>
          
          <!-- Email Input -->
          <div class="form-group-custom">
            <input type="email" id="login-email" class="form-control-custom" placeholder="Email Address" required autocomplete="username">
            <i class="fas fa-envelope"></i>
            <div class="invalid-feedback ps-2">Please enter a valid email address.</div>
          </div>

          <!-- Password Input -->
          <div class="form-group-custom">
            <input type="password" id="login-password" class="form-control-custom" placeholder="Password" required autocomplete="current-password">
            <i class="fas fa-lock"></i>
            <span class="password-toggle-btn" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </span>
            <div class="invalid-feedback ps-2">Password must be at least 6 characters.</div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-premium w-100 py-3 rounded-pill mb-3 mt-3">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>

          <!-- Back/Register Links -->
          <div class="text-center mt-3 small text-secondary">
            Don't have an account? <a href="student-register.html" class="text-primary font-weight-bold text-decoration-none">Register Now</a>
          </div>
          <div class="text-center mt-2 small">
            <a href="index.html" class="text-decoration-none text-secondary"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
          </div>

        </form>
      </div>

    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="js/app.js"></script>
  <!-- Page Specific Login JS -->
  <script src="js/login.js"></script>
</body>
</html>
