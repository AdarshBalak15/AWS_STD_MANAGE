<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Modify student details and password.">
  <title>Edit Profile - EduCloud</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- Global Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  <!-- Dashboard Layout Stylesheet -->
  <link href="css/dashboard.css" rel="stylesheet">
  <!-- Profile Page Stylesheet -->
  <link href="css/profile.css" rel="stylesheet">
  
  <!-- Route Guard -->
  <script>
    if (!localStorage.getItem('sms_current_student')) {
      window.location.href = 'student-login.html';
    }
  </script>
</head>
<body>

  <!-- Full Wrapper -->
  <div class="wrapper">
    
    <!-- Sidebar Component -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <a href="student-dashboard.html" class="sidebar-logo">
          <i class="fas fa-graduation-cap"></i>
          <span>EduCloud</span>
        </a>
      </div>
      
      <ul class="components">
        <li>
          <a href="student-dashboard.html">
            <i class="fas fa-chart-pie"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="active">
          <a href="student-profile.html">
            <i class="fas fa-user-circle"></i>
            <span>My Profile</span>
          </a>
        </li>
        <li>
          <a href="upload-document.html">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Upload Documents</span>
          </a>
        </li>
        <li>
          <a href="#" class="logout-trigger text-danger">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Content Area -->
    <div id="content">
      
      <!-- Top Navbar -->
      <nav class="navbar dashboard-navbar">
        <div class="d-flex align-items-center gap-3">
          <button type="button" id="sidebarCollapse" class="btn btn-light rounded-circle" aria-label="Toggle sidebar">
            <i class="fas fa-align-left"></i>
          </button>
          
          <!-- Breadcrumbs -->
          <div id="breadcrumbs-container" class="d-none d-md-block"></div>
        </div>
        
        <div class="d-flex align-items-center gap-3">
          <!-- User Profile Dropdown -->
          <img id="nav-avatar" src="https://via.placeholder.com/150" alt="Student Profile Avatar" class="profile-dropdown-img">
        </div>
      </nav>

      <!-- Main Container -->
      <div class="container-fluid p-4">
        
        <div class="d-flex align-items-center mb-4 gap-2">
          <a href="student-profile.html" class="btn btn-light rounded-circle p-2" aria-label="Go Back"><i class="fas fa-arrow-left"></i></a>
          <h3 class="fw-bold mb-0 text-primary">Edit Profile</h3>
        </div>

        <div class="row g-4">
          
          <!-- Image edit section + Form -->
          <div class="col-12">
            <div class="custom-card slide-up">
              <form id="edit-profile-form" novalidate>
                
                <!-- Avatar Select Component -->
                <div class="profile-photo-select-wrapper mb-4 text-center">
                  <div class="position-relative d-inline-block">
                    <img id="profile-photo-edit-preview" src="https://via.placeholder.com/150" alt="Avatar Edit Preview" class="profile-photo-edit-preview">
                    
                    <label for="edit-photo-input" class="profile-photo-select-btn" aria-label="Select photo">
                      <i class="fas fa-pencil-alt"></i>
                    </label>
                    <input type="file" id="edit-photo-input" accept="image/*" style="display:none;">
                  </div>
                </div>

                <!-- Fields -->
                <h6 class="border-bottom pb-2 mb-3 text-primary fw-bold"><i class="fas fa-user me-2"></i>Account Details</h6>
                
                <div class="mb-3">
                  <label class="form-label text-secondary small fw-bold">Full Name</label>
                  <input type="text" id="edit-name" class="form-control rounded-3" required autocomplete="name">
                  <div class="invalid-feedback">Please enter your full name (minimum 3 characters).</div>
                </div>

                <div class="mb-3">
                  <label class="form-label text-secondary small fw-bold">Email Address</label>
                  <input type="email" id="edit-email" class="form-control rounded-3" required autocomplete="email">
                  <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-3">
                  <label class="form-label text-secondary small fw-bold">New Password (leave blank to keep current)</label>
                  <input type="password" id="edit-password" class="form-control rounded-3" autocomplete="new-password" placeholder="New Password">
                  <div class="invalid-feedback">Password must be at least 6 characters.</div>
                </div>

                <!-- Save Button -->
                <div class="d-flex justify-content-end gap-3 mt-4">
                  <a href="student-profile.html" class="btn btn-light rounded-pill px-4">Cancel</a>
                  <button type="submit" class="btn-premium rounded-pill px-4">
                    <i class="fas fa-save me-2"></i>Save Changes
                  </button>
                </div>

              </form>
            </div>
          </div>

        </div>

      </div>

    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="js/app.js"></script>
  <!-- Profile Page Logic -->
  <script src="js/profile.js"></script>
</body>
</html>
