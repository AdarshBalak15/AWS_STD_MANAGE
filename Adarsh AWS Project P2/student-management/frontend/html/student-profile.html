<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View your personal student details.">
  <title>My Profile - EduCloud</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- Global Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  <!-- Dashboard Layout Stylesheet -->
  <link href="css/dashboard.css" rel="stylesheet">
  <!-- Profile Page Stylesheet -->
  <link href="css/profile.css" rel="stylesheet">
  
  <!-- Route Guard -->
  <script>
    if (!localStorage.getItem('sms_current_student')) {
      window.location.href = 'student-login.html';
    }
  </script>
</head>
<body>

  <!-- Full Wrapper -->
  <div class="wrapper">
    
    <!-- Sidebar Component -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <a href="student-dashboard.html" class="sidebar-logo">
          <i class="fas fa-graduation-cap"></i>
          <span>EduCloud</span>
        </a>
      </div>
      
      <ul class="components">
        <li>
          <a href="student-dashboard.html">
            <i class="fas fa-chart-pie"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="active">
          <a href="student-profile.html">
            <i class="fas fa-user-circle"></i>
            <span>My Profile</span>
          </a>
        </li>
        <li>
          <a href="upload-document.html">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Upload Documents</span>
          </a>
        </li>
        <li>
          <a href="#" class="logout-trigger text-danger">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Content Area -->
    <div id="content">
      
      <!-- Top Navbar -->
      <nav class="navbar dashboard-navbar">
        <div class="d-flex align-items-center gap-3">
          <button type="button" id="sidebarCollapse" class="btn btn-light rounded-circle" aria-label="Toggle sidebar">
            <i class="fas fa-align-left"></i>
          </button>
          
          <!-- Breadcrumbs -->
          <div id="breadcrumbs-container" class="d-none d-md-block"></div>
        </div>
        
        <div class="d-flex align-items-center gap-3">
          <!-- User Profile Avatar -->
          <img id="nav-avatar" src="https://via.placeholder.com/150" alt="Student Profile Avatar" class="profile-dropdown-img">
        </div>
      </nav>

      <!-- Main Container -->
      <div class="container-fluid p-4">
        
        <!-- Page Title & Edit Button -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <h3 class="fw-bold mb-0 text-primary"><i class="fas fa-user-circle me-2"></i>Student Profile</h3>
          <a href="edit-profile.html" class="btn-premium text-decoration-none">
            <i class="fas fa-user-edit me-2"></i>Edit Profile
          </a>
        </div>

        <!-- Banner Card Summary -->
        <div class="profile-banner slide-up">
          <img id="profile-avatar-large" src="https://via.placeholder.com/150" alt="Large Profile Avatar" class="profile-avatar-large">
          <div class="profile-summary">
            <div id="profile-name" class="profile-name">Student Name</div>
            <div class="profile-meta">
              <span id="profile-id"><i class="fas fa-id-badge text-primary"></i> SMS-XXXX</span>
              <span><i class="fas fa-shield-alt text-warning"></i> Status: <span class="badge bg-success" id="profile-status-badge">Active</span></span>
            </div>
          </div>
        </div>

        <!-- Details Card -->
        <div class="row g-4 mb-4">
          <div class="col-12">
            <div class="custom-card profile-detail-card slide-up">
              <h6><i class="fas fa-user me-2"></i>Account Details</h6>
              
              <div class="detail-row">
                <div class="detail-label">Student ID</div>
                <div class="detail-value font-monospace fw-bold" id="detail-id">SMS-XXXX</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Full Name</div>
                <div class="detail-value" id="detail-name">Student Name</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Email Address</div>
                <div class="detail-value" id="detail-email">student@example.com</div>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="js/app.js"></script>
  <!-- Profile Page Logic -->
  <script src="js/profile.js"></script>
</body>
</html>
