<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCloud Administrative Evaluation and Verification Portal login.">
  <title>Admin Login - EduCloud</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- Global Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  <!-- Login/Auth Stylesheet -->
  <link href="css/login.css" rel="stylesheet">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card slide-up">
      
      <!-- Card Header -->
      <div class="auth-header">
        <div class="auth-logo text-danger">
          <i class="fas fa-user-shield"></i>
        </div>
        <h2 class="auth-title">Admin Portal</h2>
        <p class="auth-subtitle">Console Log In</p>
      </div>

      <!-- Card Body -->
      <div class="auth-body">
        <form id="admin-login-form" novalidate>
          
          <!-- Username Input -->
          <div class="form-group-custom">
            <input type="text" id="admin-username" class="form-control-custom" placeholder="Administrator Username" required autocomplete="username">
            <i class="fas fa-user"></i>
            <div class="invalid-feedback ps-2">Please enter your administrator username.</div>
          </div>

          <!-- Password Input -->
          <div class="form-group-custom">
            <input type="password" id="admin-password" class="form-control-custom" placeholder="Console Password" required autocomplete="current-password">
            <i class="fas fa-lock"></i>
            <span class="password-toggle-btn" id="togglePasswordAdmin" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </span>
            <div class="invalid-feedback ps-2">Password must be at least 6 characters.</div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-premium bg-danger border-0 w-100 py-3 rounded-pill mb-3 mt-3" style="box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.3);">
            <i class="fas fa-shield-alt me-2"></i>Access Admin Console
          </button>

          <!-- Navigation Links -->
          <div class="text-center mt-3 small">
            <a href="student-login.html" class="text-primary font-weight-bold text-decoration-none"><i class="fas fa-user-graduate me-1"></i>Access Student Portal</a>
          </div>
          <div class="text-center mt-2 small">
            <a href="index.html" class="text-decoration-none text-secondary"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
          </div>

        </form>
      </div>

    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="js/app.js"></script>
  <!-- Admin Script Logic -->
  <script src="js/admin.js"></script>
</body>
</html>
